apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: zookeeper
  namespace: ksana

spec:
  replicas: 1

  selector:
    matchLabels:
      app: zookeeper

  template:
    metadata:
      labels:
        app: zookeeper

    spec:
      containers:
      - name: zookeeper
        image: confluentinc/cp-zookeeper:7.5.0

        ports:
        - containerPort: 2181

        envFrom:

        - configMapRef:
            name: zookeeper-config