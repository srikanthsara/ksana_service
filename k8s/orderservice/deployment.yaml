apiVersion: apps/v1
kind: Deployment

metadata:
  name: orderservice
  namespace: ksana

  labels:
    app: orderservice
    component: backend
    version: v1

spec:

  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: orderservice

  template:

    metadata:

      labels:
        app: orderservice
        component: backend
        version: v1

    spec:

     
      terminationGracePeriodSeconds: 30

      containers:

        - name: orderservice

          image: ksana_service-orderservice:latest

          imagePullPolicy: IfNotPresent

          ports:

            - containerPort: 8764

          envFrom:

            - configMapRef:
                name: common-config

            - configMapRef:
                name: orderservice-config

            - secretRef:
                name: orderservice-secret

          resources:

            requests:
              cpu: "250m"
              memory: "512Mi"

            limits:
              cpu: "1000m"
              memory: "1Gi"

          readinessProbe:

            httpGet:
              path: /actuator/health
              port: 8764

            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5

          livenessProbe:

            httpGet:
              path: /actuator/health
              port: 8764

            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5