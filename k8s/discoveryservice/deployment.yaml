apiVersion: apps/v1
kind: Deployment

metadata:
  name: discoveryservice
  namespace: ksana

  labels:
    app: discoveryservice
    component: backend
    version: v1

spec:

  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1

  selector:
    matchLabels:
      app: discoveryservice

  template:

    metadata:

      labels:
        app: discoveryservice
        component: backend
        version: v1

    spec:
      
      terminationGracePeriodSeconds: 30

      containers:
        - name: discoveryservice
          image: ksana_service-discoveryservice:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8761

          envFrom:
            - configMapRef:
                name: common-config
            - configMapRef:
                name: discoveryservice-config

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"

            limits:
              cpu: "1000m"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761

            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761

            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5