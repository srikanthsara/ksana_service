apiVersion: apps/v1
kind: Deployment

metadata:
  name: ksana-app
  namespace: ksana

  labels:
    app: ksana-app
    component: ksana-app
    version: v1

spec:

  replicas: 1

  strategy:

    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:

    matchLabels:
      app: ksana-app

  template:

    metadata:

      labels:
        app: ksana-app
        component: ksana-app
        version: v1

    spec:

      
      terminationGracePeriodSeconds: 30

      containers:

        - name: ksana-app

          image: ksana_service-ksana-app:latest

          imagePullPolicy: IfNotPresent

          ports:

            - containerPort: 80

          envFrom:

            - configMapRef:
                name: ksana-app-config

          resources:

            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:

            httpGet:
              path: /
              port: 80

            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:

            httpGet:
              path: /
              port: 80

            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5