apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: ksana-app-hpa
  namespace: ksana

spec:

  scaleTargetRef:

    apiVersion: apps/v1
    kind: Deployment
    name: ksana-app

  minReplicas: 1

  maxReplicas: 3

  metrics:

    - type: Resource

      resource:

        name: cpu

        target:

          type: Utilization

          averageUtilization: 70