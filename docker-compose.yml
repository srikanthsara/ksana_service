services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    
    ports:
      - "2181:2181"
      
    env_file:
      - .env.docker
      
    networks:
      - ksana-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    
    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_SERVERS}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    
    env_file:
      - .env.docker
      
    networks:
      - ksana-network

  postgres:
    image: postgres:16
    restart: unless-stopped
    container_name: postgres
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"    
    
    networks:
      - ksana-network

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      

  discoveryservice:
    build:
      context: ./discoveryservice

    container_name: discoveryservice
    restart: unless-stopped
    ports:
      - "8761:8761"
    env_file:
      - .env.docker
    environment:
        EUREKA_USER: ${EUREKA_USER}        
        EUREKA_PASSWORD: ${EUREKA_PASSWORD}      
    
    networks:
      - ksana-network

      
  configserver:
    build:
      context: ./cloudconfigserver

    container_name: configserver
    restart: unless-stopped
    depends_on:
        - discoveryservice
    
    ports:
      - "8888:8888"
    
    env_file:
      - .env.docker
     
    environment:    
        CONFIG_REPO_URL: ${CONFIG_REPO_URL}
        EUREKA_URL: ${EUREKA_URL}
           
    networks:
      - ksana-network    
      
  authservice:
    build:
      context: ./authservice

    container_name: authservice
    restart: unless-stopped
    depends_on:
      - postgres
      - configserver
      - discoveryservice

    ports:
      - "8766:8766"
      
    env_file:
      - .env.docker
      
    environment:    
        AUTH_DB_URL: ${AUTH_DB_URL}
        AUTH_DB_USER: ${AUTH_DB_USER}
        AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}        
        EUREKA_URL: ${EUREKA_URL}
        CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    
    networks:
      - ksana-network

  grocerysearchservice:
    build:
      context: ./grocerysearchservice

    container_name: grocerysearchservice
    restart: unless-stopped
    depends_on:
      - postgres
      - configserver
      - discoveryservice

    ports:
      - "8887:8887"
      
    env_file:
      - .env.docker
      
    environment:
        SEARCH_DB_URL: ${SEARCH_DB_URL}
        SEARCH_DB_USER: ${SEARCH_DB_USER}
        SEARCH_DB_PASSWORD: ${SEARCH_DB_PASSWORD}        
        EUREKA_URL: ${EUREKA_URL}
        CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}

    networks:
      - ksana-network

  paymentservice:
    build:
      context: ./paymentservice

    container_name: paymentservice
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
      - configserver
      - discoveryservice

    ports:
      - "8886:8886"
      
    env_file:
      - .env.docker
      
    environment:
        PAYMENT_DB_URL: ${PAYMENT_DB_URL}
        PAYMENT_DB_USER: ${PAYMENT_DB_USER}
        PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
        KAFKA_SERVERS: ${KAFKA_SERVERS}
        EUREKA_URL: ${EUREKA_URL}
        CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}

    networks:
      - ksana-network

  orderservice:
    build:
      context: ./orderservice

    depends_on:
      - postgres
      - kafka
      - configserver
      - discoveryservice

    container_name: orderservice
    restart: unless-stopped
    ports:
      - "8885:8885"
      
    env_file:
      - .env.docker
      
    environment:
        ORDER_DB_URL: ${ORDER_DB_URL}
        ORDER_DB_USER: ${ORDER_DB_USER}
        ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD}
        KAFKA_SERVERS: ${KAFKA_SERVERS}
        EUREKA_URL: ${EUREKA_URL}
        CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}

    networks:
      - ksana-network


  cartservice:
    build:
      context: ./cartservice

    container_name: cartservice
    restart: unless-stopped
    depends_on:
        - postgres
        - configserver
        - discoveryservice

    ports:
      - "8884:8884"
      
    env_file:
      - .env.docker
      
    environment:
        CART_DB_URL: ${CART_DB_URL}
        CART_DB_USER: ${CART_DB_USER}
        CART_DB_PASSWORD: ${CART_DB_PASSWORD}
        EUREKA_URL: ${EUREKA_URL}
        CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    networks:
      - ksana-network

  apigateway:
    build:
      context: ./apigateway

    container_name: apigateway
    restart: unless-stopped
    depends_on:
      - paymentservice
      - orderservice
      - cartservice
      - grocerysearchservice
      - authservice
      - configserver
      - discoveryservice

    ports:
      - "9090:9090"
      
    env_file:
      - .env.docker
      
    environment:
        EUREKA_URL: ${EUREKA_URL}
        CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    
    networks:
      - ksana-network    
        
   
volumes:
  postgres-data:
  
networks:
 ksana-network:
  driver: bridge