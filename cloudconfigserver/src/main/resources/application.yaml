server:
  port: 8888

spring:
  application:
    name: configserver

  profiles:
    active: git

  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URL}
          default-label: main
          clone-on-start: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: ${EUREKA_URL}